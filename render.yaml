version: 2
services:
  - type: web
    name: silver-brand-api
    runtime: python
    env: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: AI_PROVIDER
        value: gemini
      - key: ADMIN_EMAIL
        value: brandhousesilver@gmail.com
      - key: ADMIN_PHONE
        value: +5511960157100
      - key: COMPANY_NAME
        value: Silver Brand House
      - key: FRONTEND_URL
        sync: false
