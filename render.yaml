services:
  - type: web
    name: silver-brand-backend
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_VERSION
        value: "18"
      - key: PORT
        value: "3002"
      - key: FRONTEND_URL
        value: "https://silver-brand-chatbot.vercel.app"
      - key: CORS_ORIGIN
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_PROVIDER
        value: groq
      - key: ADMIN_EMAIL
        value: brandhousesilver@gmail.com
      - key: ADMIN_PHONE
        value: +5511960157100
      - key: COMPANY_NAME
        value: Silver Brand House
    buildFilter:
      paths:
        - backend/**
